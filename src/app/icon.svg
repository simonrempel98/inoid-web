<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#003366"/>

  <!-- QR finder: top-left -->
  <rect x="4" y="4" width="10" height="10" rx="2" fill="white"/>
  <rect x="6" y="6" width="6" height="6" rx="1" fill="#003366"/>
  <rect x="7.5" y="7.5" width="3" height="3" rx="0.5" fill="white"/>

  <!-- QR finder: top-right -->
  <rect x="18" y="4" width="10" height="10" rx="2" fill="white"/>
  <rect x="20" y="6" width="6" height="6" rx="1" fill="#003366"/>
  <rect x="21.5" y="7.5" width="3" height="3" rx="0.5" fill="white"/>

  <!-- QR finder: bottom-left -->
  <rect x="4" y="18" width="10" height="10" rx="2" fill="white"/>
  <rect x="6" y="20" width="6" height="6" rx="1" fill="#003366"/>
  <rect x="7.5" y="21.5" width="3" height="3" rx="0.5" fill="white"/>

  <!-- Data dots bottom-right -->
  <rect x="19" y="19" width="3" height="3" rx="0.8" fill="white"/>
  <rect x="23.5" y="19" width="3" height="3" rx="0.8" fill="white"/>
  <rect x="19" y="23.5" width="3" height="3" rx="0.8" fill="white"/>
  <rect x="23.5" y="23.5" width="3" height="3" rx="0.8" fill="#0099cc"/>
</svg>
