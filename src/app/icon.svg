  <path d="M14 16 Q14 11.5 18 9" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M14 16 Q14 20.5 18 23" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Middle arc -->
